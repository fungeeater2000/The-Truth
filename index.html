<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Truth | Official Store</title>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; text-align: center; padding: 40px 20px; margin: 0; }
        .logo { width: 280px; border-radius: 24%; margin-bottom: 30px; box-shadow: 0 0 50px rgba(212,175,55,0.6); }
        h1 { color: #d4af37; letter-spacing: 4px; text-transform: uppercase; font-size: 2.2rem; margin-bottom: 30px; }
        
        /* The Fix: 'display: block' and 'margin' forces buttons to stack properly */
        .btn { 
            display: block; 
            width: 100%;
            max-width: 300px; 
            margin: 20px auto; 
            padding: 18px; 
            background: linear-gradient(145deg, #d4af37, #f9f295, #d4af37);
            color: #000; 
            font-weight: 800; 
            text-decoration: none; 
            border-radius: 14px;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        
        .shield-btn { 
            background: transparent; 
            border: 2px solid #d4af37; 
            color: #d4af37; 
        }
    </style>
</head>
<body>

    <img src="icon.png" class="logo">
    <h1>The Truth</h1>

    <!-- STEP 1: SHIELD (DNS) -->
    <a href="shield.mobileconfig" type="application/x-apple-aspen-config" class="btn shield-btn">
       STEP 1: INSTALL SHIELD
    </a>

    <!-- STEP 2: STORE INSTALLER -->
    <a href="itms-services://?action=download-manifest&url=https://fungeeater2000.github.io" class="btn">
       STEP 2: INSTALL STORE
    </a>

</body>
</html>
