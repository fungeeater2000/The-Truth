<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Truth | Official Store</title>
<style>
body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; text-align: center; padding: 40px 20px; margin: 0; }
.logo { width: 280px; height: auto; border-radius: 24%; margin-bottom: 30px; box-shadow: 0 0 40px rgba(212, 175, 55, 0.5); }
h1 { color: #d4af37; letter-spacing: 4px; text-transform: uppercase; font-size: 2.2rem; margin-bottom: 10px; }
p { color: #888; font-size: 1.1rem; margin-bottom: 40px; }
.btn { display: block; max-width: 300px; margin: 15px auto; padding: 18px; background: linear-gradient(145deg, #d4af37, #f9f295, #d4af37); color: #000; font-weight: 800; text-decoration: none; border-radius: 14px; font-size: 1.1rem; }
.shield-btn { background: transparent; border: 2px solid #d4af37; color: #d4af37; }
.footer { font-size: 13px; color: #444; margin-top: 50px; }
</style>
</head>
<body>

<img src="icon.png" class="logo" alt="The Truth Logo">
<h1>The Truth</h1>
<p>The Gold Standard for iOS Freedom</p>

<!-- FIXED STEP 1: The 'type' attribute forces the iPhone to recognize the profile -->
<a href="./shield.mobileconfig"
type="application/x-apple-aspen-config"
class="btn shield-btn">
STEP 1: INSTALL SHIELD
</a>

<!-- STEP 2: Change YOUR_USER to your actual GitHub username below -->
<a href="itms-services://?action=download-manifest&url=https://YOUR_USER.github.io/The-Truth/app.plist"
class="btn">
STEP 2: INSTALL STORE
</a>

<div class="footer">
Settings > General > VPN & Device Management > Trust Certificate
</div>

</body>
</html>
